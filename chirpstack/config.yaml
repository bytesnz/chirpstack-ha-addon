name: "ChirpStack 4.0"
description: "ChirpStack LoRaWAN Network Server with SQLite, Gateway Bridge, and optional Concentratord"
version: "4.16.10"
slug: "chirpstack"
init: false
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
  - i386
startup: system
boot: auto
hassio_api: true
hassio_role: manager
homeassistant_api: true
host_network: true
privileged:
  - SYS_RAWIO
devices:
  - /dev/ttyUSB0
  - /dev/ttyACM0
  - /dev/ttyAMA0
  - /dev/serial/by-id
  - /dev/gpiochip0
  - /dev/gpiochip1
  - /dev/spidev0.0
  - /dev/i2c-1
ports:
  8080/tcp: 8080
  1700/udp: 1700
  3001/tcp: 3001
ports_description:
  8080/tcp: "ChirpStack Web Interface"
  1700/udp: "Semtech UDP Packet Forwarder"
  3001/tcp: "Basic Station WebSocket"
map:
  - share:rw
  - config:rw
options:
  mqtt:
    server: "tcp://core-mosquitto:1883"
    username: "chirpstack"
    password: ""

  chirpstack:
    log_level: info
    api_bind: "0.0.0.0:8080"
    api_secret: "you-must-replace-this"
    network_id: "000000"
    database_dsn: "sqlite:///config/chirpstack/chirpstack.db?mode=rwc"
    region: eu868
    advanced_config: ""

  gateway_bridge:
    log_level: info
    basic_station:
      enabled: true
      bind: "0.0.0.0:3001"
    packet_forwarder:
      enabled: true
      bind: "0.0.0.0:1700"
    advanced_config: ""

  concentratord:
    enabled: false
    model: rak_2287
    model_flags: ""
    antenna_gain: "0"

schema:
  mqtt:
    server: str
    username: str
    password: password

  chirpstack:
    log_level: list(trace|debug|info|warn|error|fatal)?
    api_bind: str?
    api_secret: str?
    network_id: str?
    database_dsn: str?
    region: list(eu868|us915|us915_2|cn470|cn779|eu433|as923|as923_2|as923_3|as923_4|au915|au915_2|in865|kr920|ru864)
    advanced_config: str?

  gateway_bridge:
    log_level: list(trace|debug|info|warn|error|fatal)?
    basic_station:
      enabled: bool?
      bind: str?
    packet_forwarder:
      enabled: bool?
      bind: str?
    advanced_config: str?

  concentratord:
    enabled: bool?
    model: list(imst_ic880a|kerlink_ifemtocell|multitech_mtcap_lora_868|multitech_mtcap_lora_915|multitech_mtac_lora_h_868|multitech_mtac_lora_h_915|pi_supply_lora_gateway_hat|rak_2245|rak_2246|rak_2247|risinghf_rhf0m301|sandbox_lorago_port|wifx_lorix_one|dragino_pg1302|elecrow_lr1302|miromico_gwc_02_lw_868|miromico_gwc_02_lw_915|mtcap3_003e00|mtcap3_003u00|multitech_mtac_003e00|multitech_mtac_003u00|rak_2287|rak_5146|seeed_wm1302|semtech_sx1302c470gw1|semtech_sx1302c868gw1|semtech_sx1302c915gw1|semtech_sx1302css868gw1|semtech_sx1302css915gw1|semtech_sx1302css923gw1|waveshare_sx1302_lorawan_gateway_hat|multitech_mtac_lora_2g4|rak_5148|semtech_sx1280z3dsfgw1)?
    model_flags: str?
    antenna_gain: str?
